<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Welcome — example share</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #0e1116; color: #e6edf3;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .box { max-width: 520px; padding: 40px; text-align: center; }
    h1 { font-size: 28px; margin: 0 0 12px; }
    p { color: #8b949e; }
    code { background: #1d222b; padding: 2px 6px; border-radius: 6px; }
    a { color: #58a6ff; }
  </style>
</head>
<body>
  <div class="box">
    <h1>👋 This is an example share</h1>
    <p>It lives at <code>public/welcome/index.html</code> and is served at <code>/welcome/</code>.</p>
    <p>Drop your own file or folder into <code>public/</code>, run <code>npm&nbsp;run&nbsp;deploy</code>, and it shows up on the <a href="../">home page</a> with its own shareable link.</p>
  </div>
</body>
</html>
